services:
  freelance_back_service:
    container_name: 'freelance'
    build:
      context: .
    ports:
      - '1337:8000'
    env_file:
      - .env
    networks:
      - freelance_network

  freelance_celery_worker_service:
    container_name: 'freelance_celery_worker'
    build:
      context: .
    env_file:
      - .env
    command: "celery --app=src.celery_tasks.celery_app:celery_instance worker -l INFO"
    networks:
      - freelance_network

networks:
  freelance_network:
    driver: bridge